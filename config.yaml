# Booksmith Pipeline Configuration
# All paths relative to this file's directory unless absolute.

# --- GitHub Monorepo ---
github:
  repo_url: "git@github.com:akinteldev/booksmith.git"
  branch: "main"

# --- Pipeline Behavior ---
pipeline:
  chapters_serial: true                                    # draft one chapter at a time
  human_gate_timeout_days: 3                               # wait for review feedback before auto-fixing
  self_review_auto_fix: true                               # if self-review flags issues, attempt fix before human gate
  logues_included:                                         # which logue pieces to generate (set false to skip)
    foreword: true
    introduction: true
    prologue: true
    epilogue: true
    glossary: true

# --- Paths ---
paths:
  base_dir: "."                                            # project root (booksmith/)
  books_dir: "books"                                       # monorepo books subdirectory
  logs_dir: "logs"                                         # execution log files
